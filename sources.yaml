    theme: digital_transformation
    origin: ru
  - name: "CNews"
    url: "https://www.cnews.ru/inc/rss/news.xml"
    theme: digital_transformation
    origin: ru

  # ── Россия: Telegram-каналы через RSSHub (best-effort) ─────────
  # Чтобы это работало стабильно, лучше поднять свой RSSHub (см. README),
  # иначе публичный rsshub.app часто отдаёт пустоту или 429.
  - name: "Основатели (TG)"
    url: "https://rsshub.app/telegram/channel/osnovateli"
    theme: leadership
    origin: ru
  - name: "Цифра / BIS digital (TG)"
    url: "https://rsshub.app/telegram/channel/bis_digital"
    theme: digital_transformation
    origin: ru
  - name: "Mash Tech (TG)"
