    origin: foreign

  # ── Роботизация / промышленная автоматизация (мир) ─────────────
  - name: "IEEE Spectrum — Robotics"
    url: "https://spectrum.ieee.org/feeds/topic/robotics.rss"
    theme: robotization
    origin: foreign
  - name: "The Robot Report"
    url: "https://www.therobotreport.com/feed/"
    theme: robotization
    origin: foreign
  - name: "Robohub"
    url: "https://robohub.org/feed/"
    theme: robotization
    origin: foreign
  - name: "Robotics & Automation News"
    url: "https://roboticsandautomationnews.com/feed/"
    theme: robotization
    origin: foreign

  # ── Россия: издания (надёжные RSS) ─────────────────────────────
  - name: "Хабр — Менеджмент"
    url: "https://habr.com/ru/rss/flows/management/articles/?fl=ru"
    theme: leadership
    origin: ru
  - name: "Хабр — Маркетинг"
    url: "https://habr.com/ru/rss/flows/marketing/articles/?fl=ru"
    theme: marketing
