# Реестр источников для контент-агента канала @nishchev
#
# Поля:
#   name   — человекочитаемое имя (попадёт в подпись поста)
#   url    — RSS/Atom-фид
#   theme  — leadership | marketing | digital_transformation | robotization
#   origin — foreign | ru   (foreign участвует в детекции эксклюзива)
#   note   — необязательный комментарий
#
# Логика эксклюзива: если свежий материал пришёл из foreign-источника и в пуле
# нет RU-источника на ту же тему за тот же период — кандидат на пометку 🌍 «эксклюзив».
#
# ВАЖНО: фиды иногда меняют адреса. Если источник не парсится — бот его просто
# пропустит и напишет об этом в лог. Проверяй раз в пару месяцев.

sources:

  # ── Лидерство / менеджмент (мир) ───────────────────────────────
  - name: "Harvard Business Review"
    url: "https://feeds.hbr.org/harvardbusiness"
    theme: leadership
    origin: foreign
  - name: "MIT Sloan Management Review"
    url: "https://sloanreview.mit.edu/feed/"
    theme: leadership
    origin: foreign
  - name: "McKinsey — Leadership"
    url: "https://www.mckinsey.com/insights/rss"
    theme: leadership
    origin: foreign
    note: "Если общий фид McKinsey шумит — замени на тематическую страницу через RSSHub."

  # ── Маркетинг (мир) ────────────────────────────────────────────
  - name: "Marketing Week"
    url: "https://www.marketingweek.com/feed/"
    theme: marketing
    origin: foreign
  - name: "Think with Google"
    url: "https://www.thinkwithgoogle.com/feed/"
    theme: marketing
    origin: foreign
  - name: "Marketing Brew"
    url: "https://www.marketingbrew.com/feed"
    theme: marketing
    origin: foreign

  # ── Цифровая трансформация предприятий (мир) ───────────────────
  - name: "MIT Technology Review"
    url: "https://www.technologyreview.com/feed/"
    theme: digital_transformation
    origin: foreign
  - name: "VentureBeat"
    url: "https://venturebeat.com/feed/"
    theme: digital_transformation
    origin: foreign
  - name: "ZDNet — Digital Transformation"
    url: "https://www.zdnet.com/topic/digital-transformation/rss.xml"
